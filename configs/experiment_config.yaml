# configs/experiment_config.yaml

# ==================== 数据配置 ====================
data:
  raw_path: "data/raw/BGL_structured.csv"
  processed_dir: "data/processed"
  window_size: 10
  step_size: 5
  train_ratio: 0.6
  val_ratio: 0.2
  random_seed: 42

# ==================== Isolation Forest 配置 ====================
if_model:
  n_estimators: 200
  max_samples: 0.8          # 每次建树采样 80% 的样本
  contamination: 0.08       # 预期异常比例（与数据集 8.15% 匹配）
  max_features: 0.8         # 【新增】每次建树采样 80% 的特征，增强多样性
  bootstrap: false
  n_jobs: 1                 # WSL2 下默认单进程更稳，必要时再手动提高
  tfidf_max_features: 500   # 降低稀疏维度，优先保证稳定性
  calibration_mode: "precision_at_recall_floor"
  calibration_min_recall: 0.98

# ==================== LSTM-Autoencoder 配置 ====================
lstm_ae:
  mode: causal_transformer
  embedding_dim: 64
  hidden_dim: 32
  num_layers: 2
  dropout: 0.3
  num_heads: 4
  epochs: 30
  batch_size: 256
  learning_rate: 0.001       # 【统一】原lr改为learning_rate，与代码及其他字段风格一致
  weight_decay: 0.0001            # 【新增】显式声明，避免get默认值隐藏问题
  early_stopping_patience: 3
  threshold_pct: 95      # 正常样本的第 95 百分位作为阈值

# ==================== 特征工程配置 (IF路线专用) ====================
feature_engineering:
  method: "tfidf"
  max_features: 500
  use_entropy: true
  use_failure_rate: true

# ==================== 评估与输出配置 ====================
evaluation:
  metrics: ["precision", "recall", "f1", "auc"]
  output_dir: "outputs/results"
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
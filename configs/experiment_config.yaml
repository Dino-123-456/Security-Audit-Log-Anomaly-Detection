# configs/experiment_config.yaml
# ==================== 数据配置 ====================
data:
  raw_path: "data/raw/BGL_structured.csv"
  processed_dir: "data/processed"
  window_size: 10
  step_size: 5
  train_ratio: 0.6
  val_ratio: 0.2
  random_seed: 42

# ==================== Isolation Forest 配置 ====================
if_model:
  n_estimators: 200
  max_samples: 0.8          
  contamination: 0.08       
  max_features: 0.8         
  bootstrap: false
  n_jobs: 1                 
  tfidf_max_features: 500   
  calibration_mode: "precision_at_recall_floor"
  calibration_min_recall: 0.98

# ==================== LSTM-Autoencoder 配置 ====================
lstm_ae:
  mode: causal_transformer
  embedding_dim: 64
  hidden_dim: 32
  num_layers: 2
  dropout: 0.3
  num_heads: 4
  epochs: 10
  batch_size: 256
  learning_rate: 0.001       
  weight_decay: 0.0001            
  early_stopping_patience: 3
  threshold_pct: 95      

# ==================== 特征工程配置 (IF路线专用) ====================
feature_engineering:
  method: "tfidf"
  max_features: 500
  use_entropy: true
  use_failure_rate: true

# ==================== Hypersphere (One-Class) 配置 ====================
hypersphere:
  embedding_dim: 64
  n_heads: 4
  num_layers: 2
  proj_dim: 32
  epochs: 20              
  batch_size: 256         
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 5  # 连续 N 个 epoch loss 不下降则停止

# ==================== 评估与输出配置 ====================
evaluation:
  metrics: ["precision", "recall", "f1", "auc"]
  output_dir: "outputs/results"
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"